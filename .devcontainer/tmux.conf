set -g default-terminal "screen-256color"

#----------------------------
# Key bindings
#----------------------------
# Change prefix key to Ctrl+a
unbind C-b
set -g prefix C-a
# Hit prefix twice to send it to the non-tmux application.
bind C-a send-prefix
# More straight forward key bindings for splitting
unbind %
bind | split-window -h
bind h split-window -h
unbind '"'
bind - split-window -v
bind v split-window -v
# Tab like window switching (-n: no prior escape seq)
bind -n S-down new-window
bind -n S-left prev
bind -n S-right next
# quick view of processes
bind '~' split-window "exec top"

#----------------------------
# Window moving / reordering
#----------------------------
# Shift+Up: prompt for a target index and swap the current window there.
# Focus follows the window to its new slot (no -d).
bind -n S-up command-prompt -p "move window to:" "swap-window -t '%%'"
# Renumber all windows sequentially to close gaps left by closed windows.
bind R move-window -r
# Automatically insert windows in the gaps when we create new ones
set-option -g renumber-windows on

#--------------------------
# Statusbar
#--------------------------
set -g status-interval 1
set -g status-justify centre # center align window list
set -g status-left-length 30
set -g status-left '#[fg=green] #(whoami)@#H #[default]'
set -g status-right '#[fg=green]#(cut -d " " -f 1-3 /proc/loadavg)#[default] #[fg=black]%H:%M:%S#[default]'
# default statusbar colors
set -g status-style fg=white,bg=colour234,bright
# default window title colors
set-window-option -g window-status-style fg=white,bg=default,dim
# active window title colors
set-window-option -g window-status-current-style fg=white,bg=default,bright
# command/message line colors
set -g message-style fg=white,bg=black,bright

#----------------------------
# Miscellaneous
#----------------------------
# Reload configuration
bind r source-file ~/.tmux.conf
# History
set -g history-limit 5000
# Start window and pane indices at 1.
set -g base-index 1
# Terminal emulator window title
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'
# Notifying if other windows has activities
setw -g monitor-activity off
set -g visual-activity on
